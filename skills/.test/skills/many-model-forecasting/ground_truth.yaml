metadata:
  skill_name: many-model-forecasting
  version: 0.2.0
  created_at: '2026-03-23T10:00:00.000000'
test_cases:
- id: mmf_20260323_prep_and_clean_data
  inputs:
    prompt: >
      Prepare and clean my time series data in catalog `sales_catalog` schema `forecasting`.
      Use case name is "retail". Create the retail_train_data table.
  outputs:
    response: ""
    execution_success: true
  expectations:
    expected_facts:
    - Collects use_case name before any data exploration (Step 0)
    - Uses SHOW TABLES to discover tables
    - Runs DESCRIBE TABLE on candidate tables
    - Detects time series frequency
    - Creates {use_case}_train_data table with unique_id, ds, y columns
    - Casts unique_id to STRING, ds to TIMESTAMP, y to DOUBLE
    - Generates date spine to detect implicit gaps (Step 7a)
    - Presents missing data summary with AskUserQuestion and imputation options
    - Performs IQR-based anomaly detection (Step 8)
    - Presents anomaly summary with AskUserQuestion for capping range
    - Creates {use_case}_cleaning_report table (Step 9)
    - All table names prefixed with use_case (retail_train_data, retail_cleaning_report)
    expected_patterns:
    - pattern: _train_data
      min_count: 2
      description: Must reference the use-case-prefixed training table
    - pattern: unique_id
      min_count: 1
      description: Must include unique_id column
    - pattern: TIMESTAMP
      min_count: 1
      description: Must cast ds to TIMESTAMP
    - pattern: CREATE OR REPLACE TABLE
      min_count: 1
      description: Must create the training table
    - pattern: SHOW TABLES
      min_count: 1
      description: Must discover available tables
    - pattern: SEQUENCE
      min_count: 1
      description: Must generate date spine for gap detection
    - pattern: PERCENTILE
      min_count: 1
      description: Must compute IQR for anomaly detection
    guidelines:
    - Must collect use_case name before any table discovery (Step 0)
    - Must explore the catalog/schema to discover time series tables
    - Must detect the data frequency (hourly, daily, weekly, monthly)
    - Must generate date spine to detect implicit gaps
    - Must present missing data summary and AskUserQuestion with imputation options
    - Must present anomaly summary and AskUserQuestion for capping range
    - Must create {use_case}_train_data with the correct MMF schema (unique_id STRING, ds TIMESTAMP, y DOUBLE)
    - Must create {use_case}_cleaning_report with imputation_method and iqr_multiplier columns
    - Should filter out NULL target values in initial table creation
    - Original Step 6 (read-only quality diagnostic) must NOT be present
  metadata:
    category: happy_path
    difficulty: medium
    source: interactive
    tags:
    - prep-and-clean-data
    - sql
    - data-preparation
    - cleaning
    created_at: '2026-03-23T10:00:00.000000'

- id: mmf_20260323_profile_series
  inputs:
    prompt: >
      Profile and classify the time series in catalog `sales_catalog` schema `forecasting`.
      Use case name is "retail", freq=D, prediction_length=30.
  outputs:
    response: ""
    execution_success: true
  expectations:
    expected_facts:
    - Accepts use_case parameter and writes to {use_case}_series_profile
    - Verifies {use_case}_train_data exists before profiling
    - Generates notebook from mmf_profiling_notebook_template.ipynb
    - Uploads notebook to workspace
    - Creates Workflow job on CPU cluster
    - Profiling computes adf_pvalue, seasonality_strength, spectral_entropy
    - Classification produces exactly two classes (high_confidence, low_signal)
    - Model recommendations use only names from MMF model catalog
    - Presents classification summary to user
    expected_patterns:
    - pattern: _series_profile
      min_count: 1
      description: Must reference the use-case-prefixed profile table
    - pattern: high_confidence
      min_count: 1
      description: Must include high_confidence classification
    - pattern: low_signal
      min_count: 1
      description: Must include low_signal classification
    - pattern: mmf_profiling_notebook_template
      min_count: 1
      description: Must reference the profiling template
    guidelines:
    - Must verify training data exists before profiling
    - Must generate notebook from template with correct placeholder substitution
    - Must create Workflow job on CPU cluster (profiling is CPU-bound)
    - Classification must produce exactly two classes (high_confidence, low_signal)
    - Model recommendations must use exact MMF model names
  metadata:
    category: happy_path
    difficulty: medium
    source: interactive
    tags:
    - profile-series
    - classification
    - notebook
    created_at: '2026-03-23T10:05:00.000000'

- id: mmf_20260323_provision_resources_cpu
  inputs:
    prompt: Set up a cluster configuration for running local statistical models (AutoArima, AutoETS) on AWS
  outputs:
    response: ""
    execution_success: true
  expectations:
    expected_facts:
    - Uses CPU cluster for local models
    - Runtime is 17.3.x-cpu-ml-scala2.13
    - Node type is i3.xlarge for AWS
    - Workers based on series count (dynamic sizing)
    - Includes spark.sql.execution.arrow.enabled=true
    - No GPU cluster needed for local models only
    - Cluster name prefixed with use_case
    - Verifies Unity Catalog enablement
    expected_patterns:
    - pattern: _cpu_cluster
      min_count: 1
      description: Must use the use-case-prefixed CPU cluster key name
    - pattern: 17\.3\.x-cpu-ml-scala2\.13
      min_count: 1
      description: Must specify the correct CPU runtime
    - pattern: i3\.xlarge
      min_count: 1
      description: Must specify correct AWS node type
    - pattern: arrow\.enabled
      min_count: 1
      description: Must enable Arrow for Spark Pandas UDFs
    guidelines:
    - Must recommend CPU cluster for local statistical models
    - Must use the correct runtime version and node type for AWS
    - Must include all required Spark configuration parameters
    - Must suggest worker count based on number of series
    - Should explain that GPU cluster is not needed for local models
    - Should mention the cluster is ephemeral (job cluster)
    - Must verify Unity Catalog enablement
  metadata:
    category: happy_path
    difficulty: easy
    source: interactive
    tags:
    - provision-resources
    - cpu
    - aws
    - local-models
    created_at: '2026-03-23T10:10:00.000000'

- id: mmf_20260323_provision_resources_gpu
  inputs:
    prompt: Configure clusters for running both local and foundation models (Chronos, AutoArima) on Azure
  outputs:
    response: ""
    execution_success: true
  expectations:
    expected_facts:
    - Recommends both CPU and GPU clusters
    - CPU runtime is 17.3.x-cpu-ml-scala2.13
    - GPU runtime is 18.0.x-gpu-ml-scala2.13
    - Azure CPU node is Standard_DS3_v2
    - GPU instance type is user-selectable
    - GPU cluster has 0 workers (single-node)
    - Cluster names prefixed with use_case
    - Presents GPU instance selection options to user
    expected_patterns:
    - pattern: _cpu_cluster
      min_count: 1
      description: Must include CPU cluster
    - pattern: _gpu_cluster
      min_count: 1
      description: Must include GPU cluster
    - pattern: 18\.0\.x-gpu-ml-scala2\.13
      min_count: 1
      description: Must specify correct GPU runtime
    - pattern: Standard_DS3_v2
      min_count: 1
      description: Must use correct Azure CPU node type
    guidelines:
    - Must recommend both CPU and GPU clusters for local + foundation models
    - Must use correct Azure node types
    - GPU cluster must be single-node (0 workers) for foundation models
    - Must present GPU instance type options to user
    - Must include all required Spark configuration parameters for each cluster
  metadata:
    category: happy_path
    difficulty: medium
    source: interactive
    tags:
    - provision-resources
    - gpu
    - azure
    - foundation-models
    - multi-cluster
    created_at: '2026-03-23T10:15:00.000000'

- id: mmf_20260323_execute_forecast_local
  inputs:
    prompt: >
      Run MMF with local models (AutoArima, AutoETS, AutoTheta) on catalog `retail` schema `demand`,
      use case "store", daily frequency, prediction_length 30
  outputs:
    response: ""
    execution_success: true
  expectations:
    expected_facts:
    - Uses StatsForecastAutoArima, StatsForecastAutoETS, StatsForecastAutoTheta model names
    - Sets prediction_length to 30
    - Derives backtest_length and stride from backtest strategy
    - Uses daily frequency (D)
    - References {use_case}_train_data
    - Creates a Workflow job with CPU cluster
    - Generates one notebook per GPU model (not applicable for local-only)
    - Logs run metadata to {use_case}_run_metadata
    - All output table names use {use_case} prefix
    - Hands off to post-processing (Skill 5) for analysis
    expected_patterns:
    - pattern: StatsForecastAutoArima
      min_count: 1
      description: Must use correct model name
    - pattern: StatsForecastAutoETS
      min_count: 1
      description: Must use correct model name
    - pattern: StatsForecastAutoTheta
      min_count: 1
      description: Must use correct model name
    - pattern: prediction_length
      min_count: 1
      description: Must specify prediction length
    - pattern: backtest_length
      min_count: 1
      description: Must specify backtest length
    - pattern: _train_data
      min_count: 1
      description: Must reference the use-case-prefixed training table
    - pattern: _evaluation_output
      min_count: 1
      description: Must reference use-case-prefixed evaluation output table
    - pattern: _run_metadata
      min_count: 1
      description: Must reference use-case-prefixed run metadata table
    guidelines:
    - Must use exact MMF model names (StatsForecastAutoArima, not AutoArima)
    - Must present backtest strategy options and derive backtest_length and stride
    - Must create a Workflow job with CPU cluster for local models
    - Must verify training data exists before running
    - Must log run metadata to {use_case}_run_metadata
    - Must hand off to Skill 5 for result analysis
    - All output table names must use {use_case} prefix
  metadata:
    category: happy_path
    difficulty: medium
    source: interactive
    tags:
    - execute-forecast
    - local-models
    - workflow
    created_at: '2026-03-23T10:20:00.000000'

- id: mmf_20260323_execute_forecast_foundation
  inputs:
    prompt: >
      Run foundation model forecasting with ChronosBoltSmall and TimesFM on catalog `energy` schema `consumption`,
      use case "power", weekly frequency, predict 12 weeks ahead
  outputs:
    response: ""
    execution_success: true
  expectations:
    expected_facts:
    - Uses ChronosBoltSmall and TimesFM_2_5_200m model names
    - Uses weekly frequency (W)
    - Sets prediction_length to 12
    - Derives backtest_length and stride from backtest strategy
    - Generates one notebook per GPU model (ChronosBoltSmall, TimesFM_2_5_200m)
    - Creates one Workflow task per GPU model chained sequentially via depends_on
    - Passes shared run_id to all GPU notebook tasks
    - GPU cluster with 0 workers (single-node)
    - Installs mmf_sa[foundation]
    - Uses accelerator="gpu"
    - All output table names use {use_case} prefix
    expected_patterns:
    - pattern: ChronosBoltSmall
      min_count: 1
      description: Must use correct foundation model name
    - pattern: TimesFM_2_5_200m
      min_count: 1
      description: Must use correct foundation model name
    - pattern: _gpu_cluster
      min_count: 1
      description: Must use GPU cluster for foundation models
    - pattern: 18\.0\.x-gpu-ml-scala2\.13
      min_count: 1
      description: Must use GPU runtime
    - pattern: foundation
      min_count: 1
      description: Must reference foundation pip extras
    - pattern: depends_on
      min_count: 1
      description: GPU tasks must be chained sequentially
    - pattern: run_id
      min_count: 1
      description: Must pass shared run_id to GPU tasks
    guidelines:
    - Must use exact MMF model names (ChronosBoltSmall, TimesFM_2_5_200m)
    - Must generate one notebook per GPU model (CUDA memory constraint)
    - Must create one Workflow task per GPU model chained sequentially via depends_on
    - Must pass a shared run_id to all GPU notebook tasks
    - Must use GPU cluster for foundation models
    - GPU cluster must be single-node (0 workers)
    - Must install mmf_sa[foundation] (not mmf_sa[global])
    - Must present backtest strategy options
  metadata:
    category: happy_path
    difficulty: hard
    source: interactive
    tags:
    - execute-forecast
    - foundation-models
    - gpu
    - workflow
    - cuda-memory
    created_at: '2026-03-23T10:25:00.000000'

- id: mmf_20260323_post_process_evaluate
  inputs:
    prompt: >
      Evaluate the forecast results for use case "retail" in catalog `sales_catalog` schema `forecasting`.
      Find the best model per series and generate a summary report.
  outputs:
    response: ""
    execution_success: true
  expectations:
    expected_facts:
    - Accepts use_case parameter and prefixes all table names
    - Verifies {use_case}_evaluation_output and {use_case}_scoring_output exist
    - Best model selection SQL uses RANK() window function
    - Creates {use_case}_best_models table
    - Computes model ranking (wins count)
    - Creates {use_case}_evaluation_summary table
    - Presents business-ready summary to user
    - Cross-references with {use_case}_series_profile when available
    - Suggests next steps based on results
    expected_patterns:
    - pattern: _best_models
      min_count: 1
      description: Must create use-case-prefixed best models table
    - pattern: _evaluation_summary
      min_count: 1
      description: Must create use-case-prefixed evaluation summary table
    - pattern: RANK
      min_count: 1
      description: Must use RANK() for best model selection
    - pattern: _evaluation_output
      min_count: 1
      description: Must reference use-case-prefixed evaluation output
    - pattern: _scoring_output
      min_count: 1
      description: Must reference use-case-prefixed scoring output
    guidelines:
    - Must verify evaluation and scoring output tables exist
    - Must use RANK() window function for best model selection
    - Must create {use_case}_best_models and {use_case}_evaluation_summary tables
    - Must present business-ready summary with wins count and average metrics
    - Should cross-reference with {use_case}_series_profile when available
    - Should suggest next steps based on results quality
  metadata:
    category: happy_path
    difficulty: medium
    source: interactive
    tags:
    - post-process
    - evaluation
    - best-model
    - sql
    created_at: '2026-03-23T10:30:00.000000'
