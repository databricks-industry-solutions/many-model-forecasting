freq: H

metric: smape

resample: false

train_predict_ratio: 1

accelerator: cpu

static_features:
  #- State

dynamic_future_numerical:

dynamic_future_categorical:
  #- Open
  #- Promo
  #- DayOfWeek

dynamic_historical_numerical:

dynamic_historical_categorical:

active_models:
  - StatsForecastBaselineWindowAverage
  - StatsForecastBaselineSeasonalWindowAverage
  - StatsForecastBaselineNaive
  - StatsForecastBaselineSeasonalNaive
  - StatsForecastAutoArima
  - StatsForecastAutoETS
  - StatsForecastAutoCES
  - StatsForecastAutoTheta
  - StatsForecastTSB
  - StatsForecastADIDA
  - StatsForecastIMAPA
  - StatsForecastCrostonClassic
  - StatsForecastCrostonOptimized
  - StatsForecastCrostonSBA
  - SKTimeProphet
  - NeuralForecastRNN
  - NeuralForecastLSTM
  - NeuralForecastNBEATSx
  - NeuralForecastNHITS
  - NeuralForecastAutoRNN
  - NeuralForecastAutoLSTM
  - NeuralForecastAutoNBEATSx
  - NeuralForecastAutoNHITS
  - NeuralForecastAutoTiDE
  - NeuralForecastAutoPatchTST
  - ChronosBoltTiny
  - ChronosBoltMini
  - ChronosBoltSmall
  - ChronosBoltBase
  - Chronos2
  - Chronos2Small
  - Chronos2Synth
  - TimesFM_2_5_200m
  - MLForecastLGBM
  - MLForecastAutoLGBM

#Here we can override hyperparameters for built-in models
models:

  StatsForecastBaselineWindowAverage:
    model_spec:
      window_size: 24

  StatsForecastBaselineSeasonalWindowAverage:
    model_spec:
      season_length: 24
      window_size: 24

  StatsForecastBaselineSeasonalNaive:
    model_spec:
      season_length: 24

  StatsForecastAutoArima:
    model_spec:
      season_length: 24
      approximation:
      level:

  StatsForecastAutoETS:
    model_spec:
      season_length: 24
      model: "ZNZ"

  StatsForecastAutoCES:
    model_spec:
      season_length: 24
      model: "Z"

  StatsForecastAutoTheta:
    model_spec:
      season_length: 24
      decomposition_type: "multiplicative"

  MLForecastLGBM:
    features:
      lags: [1, 24, 48, 168]
      date_features: ["hour", "dayofweek"]
      target_transforms: ["differences_1"]
      lag_transforms:
        1: ["rolling_mean_24"]

  MLForecastAutoLGBM:
    season_length: 24
    feature_space:
      lags:
        - [1, 24]
        - [1, 24, 48]
        - [1, 24, 168]
      date_features:
        - ["hour"]
        - ["hour", "dayofweek"]
      target_transforms:
        - "none"
        - "differences_1"
      lag_transforms:
        - "none"
        - "rolling_mean_24"

temp_path: /Volumes/mmf/tmp/partitions