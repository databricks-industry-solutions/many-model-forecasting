freq: M

metric: smape

resample: false

train_predict_ratio: 1

accelerator: cpu

static_features:
  #- State

dynamic_future_numerical:

dynamic_future_categorical:
  #- Open
  #- Promo
  #- DayOfWeek

dynamic_historical_numerical:

dynamic_historical_categorical:

active_models:
  - StatsForecastBaselineWindowAverage
  - StatsForecastBaselineSeasonalWindowAverage
  - StatsForecastBaselineNaive
  - StatsForecastBaselineSeasonalNaive
  - StatsForecastAutoArima
  - StatsForecastAutoETS
  - StatsForecastAutoCES
  - StatsForecastAutoTheta
  - StatsForecastTSB
  - StatsForecastADIDA
  - StatsForecastIMAPA
  - StatsForecastCrostonClassic
  - StatsForecastCrostonOptimized
  - StatsForecastCrostonSBA
  - SKTimeProphet
  - NeuralForecastRNN
  - NeuralForecastLSTM
  - NeuralForecastNBEATSx
  - NeuralForecastNHITS
  - NeuralForecastAutoRNN
  - NeuralForecastAutoLSTM
  - NeuralForecastAutoNBEATSx
  - NeuralForecastAutoNHITS
  - NeuralForecastAutoTiDE
  - NeuralForecastAutoPatchTST
  - ChronosBoltTiny
  - ChronosBoltMini
  - ChronosBoltSmall
  - ChronosBoltBase
  - Chronos2
  - Chronos2Small
  - Chronos2Synth
  - TimesFM_2_5_200m
  - MLForecastLGBM
  - MLForecastAutoLGBM

#Here we can override hyperparameters for built-in models
models:

  StatsForecastBaselineWindowAverage:
    model_spec:
      window_size: 12

  StatsForecastBaselineSeasonalWindowAverage:
    model_spec:
      season_length: 12
      window_size: 12

  StatsForecastBaselineSeasonalNaive:
    model_spec:
      season_length: 12

  StatsForecastAutoArima:
    model_spec:
      season_length: 12
      approximation:
      level:

  StatsForecastAutoETS:
    model_spec:
      season_length: 12
      model: "ZNZ"

  StatsForecastAutoCES:
    model_spec:
      season_length: 12
      model: "Z"

  StatsForecastAutoTheta:
    model_spec:
      season_length: 12
      decomposition_type: "multiplicative"

  MLForecastLGBM:
    features:
      lags: [1, 3, 6, 12]
      date_features: ["month", "quarter"]
      target_transforms: ["differences_1"]
      lag_transforms:
        1: ["rolling_mean_3", "rolling_mean_12"]

  MLForecastAutoLGBM:
    season_length: 12
    feature_space:
      lags:
        - [1, 12]
        - [1, 6, 12]
        - [1, 3, 6, 12]
      date_features:
        - ["month", "quarter"]
        - ["month", "quarter", "year"]
      target_transforms:
        - "none"
        - "differences_1"
      lag_transforms:
        - "none"
        - "rolling_mean_3"
        - "rolling_mean_6"
        - "rolling_mean_12"

temp_path: /Volumes/mmf/tmp/partitions